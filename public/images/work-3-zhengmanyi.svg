<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bgHotpot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d"/>
      <stop offset="50%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#450a0a"/>
    </linearGradient>
    <radialGradient id="potGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="potMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78716c"/>
      <stop offset="30%" style="stop-color:#a8a29e"/>
      <stop offset="70%" style="stop-color:#57534e"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="redBroth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <radialGradient id="steamGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:0"/>
    </radialGradient>
    <filter id="potShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="600" fill="url(#bgHotpot)"/>
  <rect width="600" height="600" fill="url(#potGlow)"/>
  
  <ellipse cx="300" cy="480" rx="250" ry="40" fill="#1c1917" opacity="0.6"/>
  
  <g filter="url(#potShadow)">
    <ellipse cx="300" cy="450" rx="210" ry="40" fill="#292524"/>
    <path d="M90,380 Q90,480 300,500 Q510,480 510,380" fill="url(#potMetal)" stroke="#44403c" stroke-width="3"/>
    <ellipse cx="300" cy="380" rx="210" ry="55" fill="#1c1917"/>
    <ellipse cx="300" cy="375" rx="195" ry="48" fill="url(#redBroth)"/>
    
    <path d="M90,350 Q80,340 70,355 Q60,370 75,380" fill="none" stroke="url(#potMetal)" stroke-width="12" stroke-linecap="round"/>
    <path d="M510,350 Q520,340 530,355 Q540,370 525,380" fill="none" stroke="url(#potMetal)" stroke-width="12" stroke-linecap="round"/>
    
    <line x1="300" y1="327" x2="300" y2="423" stroke="#44403c" stroke-width="4"/>
  </g>
  
  <g fill="#dc2626" opacity="0.8">
    <ellipse cx="220" cy="365" rx="12" ry="8"/>
    <ellipse cx="260" cy="355" rx="10" ry="7"/>
    <ellipse cx="180" cy="375" rx="11" ry="8"/>
    <ellipse cx="240" cy="380" rx="9" ry="6"/>
    <ellipse cx="380" cy="360" rx="12" ry="8"/>
    <ellipse cx="420" cy="370" rx="10" ry="7"/>
    <ellipse cx="350" cy="380" rx="11" ry="7"/>
  </g>
  
  <g fill="#a16207">
    <circle cx="170" cy="360" r="10"/>
    <circle cx="280" cy="385" r="12"/>
    <circle cx="400" cy="355" r="9"/>
    <circle cx="340" cy="370" r="11"/>
  </g>
  
  <g fill="#16a34a">
    <ellipse cx="200" cy="350" rx="8" ry="5" transform="rotate(15 200 350)"/>
    <ellipse cx="250" cy="370" rx="7" ry="4" transform="rotate(-20 250 370)"/>
    <ellipse cx="430" cy="358" rx="9" ry="5" transform="rotate(25 430 358)"/>
    <ellipse cx="370" cy="385" rx="8" ry="5" transform="rotate(-10 370 385)"/>
  </g>
  
  <g fill="#fef3c7" opacity="0.7">
    <ellipse cx="150" cy="370" rx="15" ry="10"/>
    <ellipse cx="450" cy="365" rx="14" ry="9"/>
    <ellipse cx="290" cy="350" rx="12" ry="8"/>
  </g>
  
  <g opacity="0.4">
    <ellipse cx="220" cy="200" rx="30" ry="80" fill="url(#steamGlow)">
      <animate attributeName="cy" values="220;180;220" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="180" rx="40" ry="100" fill="url(#steamGlow)">
      <animate attributeName="cy" values="200;150;200" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.08;0.3" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="380" cy="210" rx="35" ry="85" fill="url(#steamGlow)">
      <animate attributeName="cy" values="230;185;230" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.12;0.35" dur="2.8s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g fill="#fbbf24" opacity="0.6">
    <circle cx="100" cy="120" r="2" fill="#fef3c7">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="100" r="1.5" fill="#fef3c7">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="80" r="1.8"/>
    <circle cx="440" cy="130" r="1.2"/>
  </g>
  
  <text x="300" y="555" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#fbbf24" opacity="0.9">郑满意火锅</text>
</svg>
