<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bgShrimp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#451a03"/>
      <stop offset="40%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#9a3412"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="50%" cy="75%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="shrimpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="50%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#9a3412"/>
    </linearGradient>
    <linearGradient id="bambooGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="50%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <filter id="glowShrimp" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="600" fill="url(#bgShrimp)"/>
  <rect width="600" height="600" fill="url(#fireGlow)"/>
  
  <g transform="translate(0,380)">
    <path d="M0,50 Q80,20 150,45 Q220,70 300,35 Q380,0 450,40 Q520,80 600,30 L600,220 L0,220 Z" fill="#1c1917" opacity="0.5"/>
  </g>
  
  <g transform="translate(100,200) rotate(-15)" filter="url(#glowShrimp)">
    <rect x="-30" y="-8" width="460" height="16" rx="8" fill="url(#bambooGrad)"/>
    
    <g>
      <ellipse cx="40" cy="0" rx="28" ry="22" fill="url(#shrimpGrad)"/>
      <ellipse cx="90" cy="-2" rx="26" ry="20" fill="url(#shrimpGrad)"/>
      <ellipse cx="140" cy="0" rx="28" ry="22" fill="url(#shrimpGrad)"/>
      <ellipse cx="190" cy="-2" rx="25" ry="19" fill="url(#shrimpGrad)"/>
      <ellipse cx="240" cy="0" rx="27" ry="21" fill="url(#shrimpGrad)"/>
      <ellipse cx="290" cy="-1" rx="24" ry="18" fill="url(#shrimpGrad)"/>
      <ellipse cx="340" cy="0" rx="26" ry="20" fill="url(#shrimpGrad)"/>
    </g>
    
    <g fill="#fbbf24" opacity="0.6">
      <circle cx="40" cy="-8" r="3"/>
      <circle cx="140" cy="-7" r="3"/>
      <circle cx="240" cy="-8" r="3"/>
      <circle cx="340" cy="-7" r="3"/>
      <circle cx="90" cy="5" r="2"/>
      <circle cx="190" cy="4" r="2"/>
      <circle cx="290" cy="5" r="2"/>
    </g>
  </g>
  
  <g transform="translate(130,290) rotate(10)" opacity="0.8" filter="url(#glowShrimp)">
    <rect x="-30" y="-7" width="420" height="14" rx="7" fill="url(#bambooGrad)" opacity="0.85"/>
    
    <g>
      <ellipse cx="50" cy="0" rx="25" ry="19" fill="url(#shrimpGrad)"/>
      <ellipse cx="110" cy="-1" rx="27" ry="21" fill="url(#shrimpGrad)"/>
      <ellipse cx="170" cy="0" rx="24" ry="18" fill="url(#shrimpGrad)"/>
      <ellipse cx="230" cy="-2" rx="26" ry="20" fill="url(#shrimpGrad)"/>
      <ellipse cx="290" cy="0" rx="25" ry="19" fill="url(#shrimpGrad)"/>
    </g>
  </g>
  
  <g fill="#fbbf24" opacity="0.4">
    <ellipse cx="180" cy="480" rx="12" ry="25" transform="rotate(-10 180 480)">
      <animate attributeName="ry" values="25;35;25" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="0.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="300" cy="490" rx="15" ry="35" transform="rotate(5 300 490)">
      <animate attributeName="ry" values="35;45;35" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0.3" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="420" cy="475" rx="10" ry="28" transform="rotate(-8 420 475)">
      <animate attributeName="ry" values="28;38;28" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.18;0.35" dur="0.7s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g fill="#f97316" opacity="0.25">
    <ellipse cx="220" cy="500" rx="20" ry="15">
      <animate attributeName="ry" values="15;25;15" dur="0.9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="380" cy="505" rx="18" ry="20">
      <animate attributeName="ry" values="20;30;20" dur="1.1s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g fill="#fef3c7" opacity="0.5">
    <circle cx="80" cy="100" r="2"/>
    <circle cx="520" cy="80" r="2"/>
    <circle cx="150" cy="60" r="1.5"/>
    <circle cx="450" cy="120" r="1.5"/>
  </g>
  
  <text x="300" y="555" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#fbbf24" opacity="0.9">毛大佑烤虾球</text>
</svg>
