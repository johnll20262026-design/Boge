<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bgNoodle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="50%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <radialGradient id="bowlGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#fffbeb"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="brothGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
    <filter id="softShadowN" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="600" fill="url(#bgNoodle)"/>
  
  <ellipse cx="300" cy="330" rx="210" ry="160" fill="url(#bowlGlow)"/>
  
  <g filter="url(#softShadowN)">
    <ellipse cx="300" cy="340" rx="200" ry="55" fill="#92400e"/>
    <path d="M100,340 Q100,500 300,520 Q500,500 500,340" fill="url(#bowlGrad)" stroke="#d97706" stroke-width="4"/>
    <ellipse cx="300" cy="340" rx="185" ry="45" fill="url(#brothGrad)"/>
  </g>
  
  <g opacity="0.7">
    <ellipse cx="240" cy="330" rx="22" ry="8" fill="#fef3c7"/>
    <ellipse cx="290" cy="325" rx="20" ry="7" fill="#fef3c7"/>
    <ellipse cx="345" cy="335" rx="24" ry="9" fill="#fef3c7"/>
    <ellipse cx="380" cy="328" rx="18" ry="7" fill="#fef3c7"/>
  </g>
  
  <g fill="#7c2d12">
    <ellipse cx="220" cy="320" rx="15" ry="10"/>
    <ellipse cx="370" cy="318" rx="17" ry="11"/>
    <ellipse cx="280" cy="312" rx="13" ry="9"/>
    <ellipse cx="330" cy="338" rx="14" ry="9"/>
  </g>
  
  <g fill="#16a34a">
    <ellipse cx="255" cy="345" rx="8" ry="5" transform="rotate(20 255 345)"/>
    <ellipse cx="315" cy="348" rx="9" ry="6" transform="rotate(-15 315 348)"/>
    <ellipse cx="395" cy="340" rx="7" ry="4" transform="rotate(30 395 340)"/>
  </g>
  
  <g stroke="#fbbf24" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M260,260 Q270,240 280,260 Q290,280 300,260 Q310,240 320,260"/>
    <path d="M250,245 Q265,220 285,245 Q305,270 325,245 Q340,225 350,245"/>
  </g>
  
  <g transform="translate(140,180)" fill="#fef3c7" opacity="0.4">
    <circle cx="0" cy="15" r="6"/>
    <circle cx="18" cy="0" r="5"/>
    <circle cx="32" cy="12" r="7"/>
    <circle cx="50" cy="-5" r="4"/>
    <circle cx="65" cy="8" r="5"/>
  </g>
  <g transform="translate(380,160)" fill="#fef3c7" opacity="0.3">
    <circle cx="0" cy="10" r="5"/>
    <circle cx="20" cy="-8" r="6"/>
    <circle cx="40" cy="5" r="4"/>
    <circle cx="58" cy="-12" r="5"/>
  </g>
  
  <text x="300" y="555" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#78350f" opacity="0.9">牛伢狗面馆</text>
</svg>
